name: Release to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # Pin npm to a known-good 11.x (trusted publishing needs npm >= 11.5.1).
      # Avoid `npm install -g npm@latest` — npm@12 alpha published a broken tarball.
      - run: npm install -g npm@11.11.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: npm publish --provenance --access public
      - name: Upload dist assets to GitHub release
        run: gh release upload "${{ github.ref_name }}" dist/monoscope.min.js dist/monoscope.umd.js --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
